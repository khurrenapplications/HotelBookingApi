name: Build and deploy .NET Web API to Azure Web App - HotelAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'HotelApp' # Matches your new Web App name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # MANDATORY: Allows GitHub to securely request an OIDC token from Azure

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 1. Compiles the API and packs it into a flat, explicit zip file
      - name: Publish and Zip Web API
        shell: pwsh
        run: |
          dotnet restore
          dotnet publish -c Release -o ./publish_output
          Compress-Archive -Path ./publish_output/* -DestinationPath ./site_package.zip

      # 2. LOG IN SECURELY USING OIDC AND REPOSITORY SECRETS
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. DEPLOY VIA DIRECT ZIP TARGETING TO BYPASS PATTERN SEARCH ERRORS
      - name: Deploy Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: './site_package.zip' # Direct file routing target
