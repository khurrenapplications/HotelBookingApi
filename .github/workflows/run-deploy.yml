name: Build and deploy dotnet core app to Azure Function App - HotelAPI

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './output'
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'HotelApp' # Change this if your Azure function app name is different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # MANDATORY: Allows GitHub to securely request an OIDC token from Azure

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Web API
        shell: pwsh
        run: |
          dotnet publish --configuration Release --output ./output --self-contained false

      # 1. LOG IN SECURELY USING OIDC AND REPOSITORY VARIABLES
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2. DEPLOY APPLICATION USING SHORT-LIVED TOKEN AUTHENTICATION
      - name: Deploy Azure Web App
        uses: Azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
